version: '3.8'

services:
  velet-db:
    image: postgres:17-alpine
    container_name: velet-db
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ${DATA_DIR:-./velet-local-data}/postgres:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - velet-network

  velet-cache:
    image: redis:8.0-alpine
    container_name: velet-cache
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${DATA_DIR:-./velet-local-data}/redis:/data
    networks:
      - velet-network

  rabbitmq:
    image: rabbitmq:4.2.8-management-alpine
    container_name: velet-rabbitmq
    ports:
      # (AMQP protocol)
      - "${RABBITMQ_PORT}:5672"
      # Web UI Management
      - "${RABBITMQ_UI_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: >-
        -rabbit vm_memory_high_watermark {absolute,800000000}
        -rabbit disk_free_limit 2000000000
    volumes:
      - ${DATA_DIR:-./velet-local-data}/rabbitmq:/var/lib/rabbitmq
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
    networks:
      - velet-network

networks:
  velet-network:
    external: true
