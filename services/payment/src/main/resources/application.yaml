server:
  port: 8083

spring:
  application:
    name: velet-payment-service
  config:
    import: optional:file:.env[.properties]
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payment}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 10
          order_inserts: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    hibernate:
      ddl-auto: validate
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
          max-wait: 2000ms
  cache:
    type: redis

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        default-requeue-rejected: false
        prefetch: 10
        retry:
          enabled: true
          max-retries: 3
          initial-interval: 1000ms
          multiplier: 2.0
    username: ${RABBITMQ_USERNAME:localhost}
    password: ${RABBITMQ_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-components: always
  tracing:
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTLP_ENDPOINT:http://localhost:4318}/v1/traces

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

clients:
  wallet:
    base-url: ${WALLET_SERVICE_URL:http://localhost:8082}
  merchant:
    base-url: ${MERCHANT_SERVICE_URL:http://localhost:8083}