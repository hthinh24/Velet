server:
  port: 8080

spring:
  application:
    name: gateway
  config:
    import: optional:file:.env[.properties]
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: identity-service
              uri: ${IDENTITY_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/v1/auth/**, /api/v1/kyc/**

            - id: wallet-service
              uri: ${WALLET_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/v1/wallet/**, /api/v1/payments/**, /api/v1/orders/**, /api/v1/bills/**

            - id: loyalty-service
              uri: ${LOYALTY_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/v1/loyalty/**, /api/v1/vouchers/**

security:
  jwt-secret: ${JWT_SECRET_KEY:mysecretkey}
  public-paths: ${APP_PUBLIC_PATHS}

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.web.servlet: DEBUG